<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Bolão da Copa do Mundo 2026</title>
<style>
body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:
    linear-gradient(rgba(232,245,233,0.88), rgba(255,253,231,0.88)),
    url('https://i.imgur.com/YzX9pLr.png') center no-repeat;
  background-size: cover;
  background-attachment: fixed;
  padding:20px;
  min-height: 100vh;
}
.container {
  max-width:600px;
  margin:50px auto;
  background:white;
  border-radius:20px;
  padding:40px;
  box-shadow:0 8px 30px rgba(0,0,0,0.15);
  border-top:10px solid #ffdf00;
  position: relative;
  z-index: 1;
}
h1 {color:#002776; text-align:center; font-size:30px; margin-bottom:10px;}
.subtitle {text-align:center; color:#666; font-size:14px; margin-bottom:30px;}
input {width:100%; padding:14px; border:3px solid #ddd; border-radius:10px; margin-bottom:15px; box-sizing:border-box; font-size:15px; background:#fff;}
.btn {width:100%; padding:16px; background:#009c3b; color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold; font-size:18px; margin-top:20px;}
.btn:hover {background:#007a2e;}
.jogo {background:#f8f9fa; padding:20px; border-radius:12px; margin-bottom:15px; border-left:5px solid #009c3b;}
.jogo h3 {margin:0 0 15px 0; color:#002776;}
.placar-inputs {display:flex; gap:10px; align-items:center;}
.placar-inputs input {width:70px; text-align:center; font-size:20px; font-weight:bold;}
.codigo-final {font-size:32px; font-weight:bold; color:#e65100; background:#ffdf00; padding:20px; border-radius:12px; text-align:center; margin:25px 0; border:3px solid #002776;}
</style>
</head>
<body>
<div class="container">
  <h1>🇧🇷 BOLÃO DA COPA DO MUNDO 2026 🇧🇷</h1>
  <p class="subtitle">Faça seu palpite e concorra!</p>
  <div id="telaInicial">
    <input type="text" id="nomeJogador" placeholder="Digite seu nome completo">
    <input type="tel" id="telefoneJogador" placeholder="Digite seu WhatsApp - Ex: 11999999">
    <button class="btn" onclick="iniciar()">Começar Palpite</button>
  </div>
  <div id="telaJogos" style="display:none;"></div>
  <div id="telaFinal" style="display:none;"></div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyASU0imFDT7qJ7AqRLAzEAYHILQN1w9UK0",
  authDomain: "bolao-4c08e.firebaseapp.com",
  projectId: "bolao-4c08e",
  storageBucket: "bolao-4c08e.firebasestorage.app",
  messagingSenderId: "464776970777",
  appId: "1:464776970777:web:cdb7cb7cc645c1ae212088",
  measurementId: "G-R7EJ4EVQ2S"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let nomeAtual = "";
let telefoneAtual = "";
let jogosAtuais = "";

window.iniciar = async function() {
  nomeAtual = document.getElementById("nomeJogador").value.trim();
  telefoneAtual = document.getElementById("telefoneJogador").value.trim();
  if(!nomeAtual) return alert("Digite seu nome!");
  if(!telefoneAtual) return alert("Digite seu WhatsApp!");
  const snap = await getDocs(collection(db, "jogos"));
  if(snap.empty) return alert("Ainda não tem jogo cadastrado. Aguarde o ADM!");
  jogosAtuais = [];
  snap.forEach(d => jogosAtuais.push({id:d.id,...d.data()}));
  document.getElementById("telaInicial").style.display = "none";
  const div = document.getElementById("telaJogos");
  div.style.display = "block";
  let html = "<h2 style='color:#002776'>Digite seus palpites:</h2>";
  jogosAtuais.forEach((j,i) => {
    html += `<div class="jogo"><h3>${j.timeA} vs ${j.timeB}</h3><div class="placar-inputs">
      <input type="number" id="placarA${i}" min="0" placeholder="0">
      <span style="font-size:24px; font-weight:bold;">X</span>
      <input type="number" id="placarB${i}" min="0" placeholder="0"></div></div>`;
  });
  html += `<button class="btn" onclick="finalizar()">Finalizar Palpite</button>`;
  div.innerHTML = html;
}

window.finalizar = async function() {
  const palpites = [];
  for(let i=0;i<jogosAtuais.length;i++){
    const a = document.getElementById(`placarA${i}`).value;
    const b = document.getElementById(`placarB${i}`).value;
    if(a===""||b==="") return alert("Preencha todos os placares!");
    palpites.push({timeA:jogosAtuais[i].timeA,timeB:jogosAtuais[i].timeB,placarA:a,placarB:b});
  }
  const codigo = Math.random().toString(36).substring(2,8).toUpperCase();
  await addDoc(collection(db,"palpites"),{nome:nomeAtual,telefone:telefoneAtual,codigo:codigo,palpites:palpites,data:serverTimestamp()});
  document.getElementById("telaJogos").style.display = "none";
  const div = document.getElementById("telaFinal");
  div.style.display = "block";
  div.innerHTML = `<div class="codigo-final">${codigo}</div>
    <button class="btn" onclick="mostrarQR('${codigo}')">Entrar no WhatsApp e ver QR Code</button>
    <div id="qrcodeBox" style="display:none; text-align:center; margin:25px 0;">
      <img src="krcode.png" style="width:200px; border:3px solid #002776; border-radius:12px; margin-bottom:15px;">
    </div>`;
}

window.mostrarQR = function(codigo) {
  document.getElementById("qrcodeBox").style.display = "block";
  enviarWhats(codigo);
}

window.enviarWhats = function(codigo){
  const msg = `Bolão Copa 2026\nMeu código: ${codigo}\nNome: ${nomeAtual}\nTelefone: ${telefoneAtual}`;
  window.open(`https://api.whatsapp.com/send?phone=559181761730&text=${encodeURIComponent(msg)}`,"_blank");
}
</script>
</body>
</html>
