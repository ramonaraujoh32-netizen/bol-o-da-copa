<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Bolão da Copa do Mundo 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body {
  margin:0;
  font-family:'Poppins', sans-serif;
  background: linear-gradient(135deg, #009c3b 0%, #ffdf00 50%, #002776 100%);
  background-attachment: fixed;
  padding:20px;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.players-on-top {
  position: absolute;
  top: -85px; /* desci mais 50px */
  left: 50%;
  transform: translateX(-50%);
  width: 95%;
  max-width: 580px;
  z-index: 5;
  pointer-events: none;
}

.players-on-top img {
  width: 100%;
  height: auto;
  display: block;
}

.container {
  max-width:600px;
  width: 95%;
  margin: 30px auto 0; /* subi o quadrado de 70px pra 30px */
  background: linear-gradient(180deg, #009c3b 0%, #007a2f 100%);
  border-radius:25px;
  padding:60px 30px 20px 30px;
  box-shadow:0 12px 40px rgba(0,0,0,0.4);
  border: 4px solid #ffdf00;
  position: relative;
  z-index: 1;
}
h1 {
  font-family: 'Bebas Neue', sans-serif;
  color:#ffdf00;
  text-align:center;
  font-size:42px;
  margin-bottom:5px;
  letter-spacing:2px;
  text-shadow:3px 3px 0px #002776;
  line-height:1.1;
}
.hexa {
  font-family: 'Bebas Neue', sans-serif;
  color:white;
  text-align:center;
  font-size:28px;
  margin-bottom:25px;
  letter-spacing:3px;
  text-shadow:2px 2px 4px rgba(0,0,0,0.5);
}
.subtitle {
  text-align:center;
  color:white;
  font-size:16px;
  margin-bottom:30px;
  font-weight:600;
}
input {
  width:100%;
  padding:18px;
  border:3px solid #ffdf00;
  border-radius:12px;
  margin-bottom:20px;
  box-sizing:border-box;
  font-size:17px;
  background:white;
  font-family:'Poppins', sans-serif;
  font-weight:600;
}
.btn {
  width:100%;
  padding:20px;
  background:#ffdf00;
  color:#002776;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
  font-size:20px;
  margin-top:25px;
  font-family:'Poppins', sans-serif;
  text-transform:uppercase;
  letter-spacing:1px;
}
.btn:hover {background:#ffeb3b;}
.jogo {
  background:white;
  padding:25px;
  border-radius:15px;
  margin-bottom:20px;
  border-left:6px solid #009c3b;
}
.jogo h3 {
  margin:0 0 20px 0;
  color:#002776;
  font-size:20px;
  font-family:'Bebas Neue', sans-serif;
  letter-spacing:1px;
}
.placar-inputs {
  display:flex;
  gap:15px;
  align-items:center;
}
.placar-inputs input {
  width:80px;
  text-align:center;
  font-size:24px;
  font-weight:bold;
  padding:15px;
  border:3px solid #009c3b;
}
.codigo-final {
  font-size:36px;
  font-weight:bold;
  color:#002776;
  background:#ffdf00;
  padding:25px;
  border-radius:15px;
  text-align:center;
  margin:30px 0;
  border:4px solid #002776;
  letter-spacing:3px;
}
.parabens-box {
  background:linear-gradient(135deg,#ffdf00 0%,#fff9c4 100%);
  border:4px solid #002776;
  border-radius:25px;
  padding:35px;
  text-align:center;
  margin-bottom:35px;
  animation: pulse 1.5s infinite;
}
@keyframes pulse {
 0%, 100% {transform:scale(1);}
 50% {transform:scale(1.03);}
}
.jogadores {
  margin-top:35px;
  padding-top:25px;
  border-top:3px solid #ffdf00;
  text-align:center;
}
.jogadores-title {
  color:#ffdf00;
  font-family:'Bebas Neue', sans-serif;
  font-size:20px;
  letter-spacing:2px;
  margin-bottom:15px;
}
.jogadores-grid {
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}
.jogadores-grid img {
  width:50px;
  height:50px;
  border-radius:50%;
  border:3px solid #ffdf00;
  object-fit:cover;
  background:white;
}
</style>
</head>
<body>

<div class="players-on-top">
  <img src="jgd.png" alt="Seleção Brasil">
</div>

<div class="container">
  <h1>🇧🇷 BOLÃO DA COPA DO MUNDO 2026 🇧🇷</h1>
  <div class="hexa">BRASIL RUMO AO HEXA 🏆</div>
  <p class="subtitle">Faça login com seu WhatsApp</p>
  <div id="telaInicial">
    <input type="text" id="nomeJogador" placeholder="Digite seu nome completo">
    <input type="tel" id="telefoneJogador" placeholder="Digite seu WhatsApp - Ex: 11999999">
    <button class="btn" onclick="login()">Entrar</button>
  </div>
  <div id="telaJogos" style="display:none;"></div>
  <div id="telaFinal" style="display:none;"></div>
  
  <div class="jogadores">
    <div class="jogadores-title">NOSSA SELEÇÃO</div>
    <div class="jogadores-grid">
      <img src="https://i.imgur.com/5Qm2hZx.png" alt="Neymar" title="Neymar">
      <img src="https://i.imgur.com/9vL8wQp.png" alt="Vini Jr" title="Vini Jr">
      <img src="https://i.imgur.com/3kX7mRn.png" alt="Rodrygo" title="Rodrygo">
      <img src="https://i.imgur.com/7bF2aLq.png" alt="Alisson" title="Alisson">
      <img src="https://i.imgur.com/2jN4mKp.png" alt="Marquinhos" title="Marquinhos">
      <img src="https://i.imgur.com/8wR5sVt.png" alt="Casemiro" title="Casemiro">
      <img src="https://i.imgur.com/4mP6xYb.png" alt="Endrick" title="Endrick">
      <img src="https://i.imgur.com/6tL9zWc.png" alt="Paquetá" title="Paquetá">
    </div>
  </div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, setDoc, doc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyASU0imFDT7qJ7AqRLAzEAYHILQN1w9UK0",
  authDomain: "bolao-4c08e.firebaseapp.com",
  projectId: "bolao-4c08e",
  storageBucket: "bolao-4c08e.firebasestorage.app",
  messagingSenderId: "464776970777",
  appId: "1:464776970777:web:cdb7cb7cc645c1ae212088",
  measurementId: "G-R7EJ4EVQ2S"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let nomeAtual = "";
let telefoneAtual = "";
let jogosAtuais = [];
let codigoAtual = "";

window.login = async function() {
  nomeAtual = document.getElementById("nomeJogador").value.trim();
  telefoneAtual = document.getElementById("telefoneJogador").value.trim();
  if(!nomeAtual) return alert("Digite seu nome!");
  if(!telefoneAtual) return alert("Digite seu WhatsApp!");

  const snapJogos = await getDocs(collection(db, "jogos"));
  if(snapJogos.empty) return alert("Ainda não tem jogo cadastrado. Aguarde o ADM!");

  jogosAtuais = [];
  snapJogos.forEach(d => jogosAtuais.push({id:d.id,...d.data()}));

  const docRef = doc(db, "palpites", telefoneAtual);
  const docSnap = await getDoc(docRef);

  if(docSnap.exists()) {
    const dadosSalvos = docSnap.data();
    if(dadosSalvos.nome.toLowerCase()!== nomeAtual.toLowerCase()) {
      return alert(`Esse WhatsApp já pertence ao usuário: ${dadosSalvos.nome}\nUse o nome correto para entrar.`);
    }
    codigoAtual = dadosSalvos.codigo;
    alert(`Bem vindo de volta, ${nomeAtual}!`);
  } else {
    codigoAtual = Math.random().toString(36).substring(2,8).toUpperCase();
  }

  abrirTelaJogos();
}

async function abrirTelaJogos() {
  document.getElementById("telaInicial").style.display = "none";
  const div = document.getElementById("telaJogos");
  div.style.display = "block";

  let htmlParabens = await verificarParabens();

  let html = htmlParabens + "<h2 style='color:#ffdf00; font-family:Bebas Neue; font-size:32px; letter-spacing:1px; text-align:center;'>Digite seus palpites:</h2>";
  jogosAtuais.forEach((j,i) => {
    html += `<div class="jogo"><h3>${j.timeA} vs ${j.timeB}</h3><div class="placar-inputs">
      <input type="number" id="placarA${i}" min="0" placeholder="0">
      <span style="font-size:28px; font-weight:bold;">X</span>
      <input type="number" id="placarB${i}" min="0" placeholder="0"></div></div>`;
  });
  html += `<button class="btn" onclick="salvar()">Salvar Palpite</button>`;
  div.innerHTML = html;
}

async function verificarParabens() {
  const docRef = doc(db, "palpites", telefoneAtual);
  const docSnap = await getDoc(docRef);
  if(!docSnap.exists()) return "";

  const meusPalpites = docSnap.data().palpites || [];
  const resultadosSnap = await getDocs(collection(db, "resultados"));
  
  const jogosAcertados = [];
  resultadosSnap.forEach(d => {
    const resultado = d.data();
    const palpite = meusPalpites.find(p =>
      p.timeA.toLowerCase() === resultado.timeA.toLowerCase() &&
      p.timeB.toLowerCase() === resultado.timeB.toLowerCase() &&
      p.placarA === resultado.placarA &&
      p.placarB === resultado.placarB
    );
    if(palpite) {
      jogosAcertados.push(`${resultado.timeA} ${resultado.placarA} x ${resultado.placarB} ${resultado.timeB}`);
    }
  });

  if(jogosAcertados.length === 0) return "";

  return `
    <div class="parabens-box">
      <div style="font-size:70px; margin-bottom:15px;">🎉</div>
      <h2 style="color:#e65100; margin:0 0 15px 0; font-family:Bebas Neue; font-size:38px; letter-spacing:2px;">PARABÉNS, ${nomeAtual.toUpperCase()}!</h2>
      <p style="font-size:20px; color:#002776; margin:0 0 20px 0; font-weight:600;">
        Você acertou o placar de:
      </p>
      ${jogosAcertados.map(j => `<div style="background:white; padding:15px; border-radius:12px; margin-bottom:12px; font-weight:bold; font-size:20px; color:#002776;">${j}</div>`).join('')}
      <div style="margin-top:25px;">
        <img src="https://media.giphy.com/media/3o7abKhOpu0NwenH3O/giphy.gif" style="max-width:280px; border-radius:15px;">
      </div>
    </div>
  `;
}

window.salvar = async function() {
  const docRef = doc(db, "palpites", telefoneAtual);
  const docSnap = await getDoc(docRef);

  let palpitesAntigos = [];
  if(docSnap.exists()) {
    palpitesAntigos = docSnap.data().palpites || [];
  }

  const palpitesNovos = [];
  for(let i=0;i<jogosAtuais.length;i++){
    const a = document.getElementById(`placarA${i}`).value;
    const b = document.getElementById(`placarB${i}`).value;
    if(a===""||b==="") return alert("Preencha todos os placares!");

    const timeA = jogosAtuais[i].timeA;
    const timeB = jogosAtuais[i].timeB;

    const jaApostou = palpitesAntigos.some(p =>
      p.timeA.toLowerCase() === timeA.toLowerCase() &&
      p.timeB.toLowerCase() === timeB.toLowerCase()
    );

    if(jaApostou) {
      return alert(`Você já apostou em ${timeA} x ${timeB}!`);
    }

    palpitesNovos.push({timeA:timeA,timeB:timeB,placarA:a,placarB:b});
  }

  const palpitesFinais = [...palpitesAntigos,...palpitesNovos];

  await setDoc(doc(db, "palpites", telefoneAtual), {
    nome: nomeAtual,
    telefone: telefoneAtual,
    codigo: codigoAtual,
    palpites: palpitesFinais,
    data: serverTimestamp()
  });

  document.getElementById("telaJogos").style.display = "none";
  const div = document.getElementById("telaFinal");
  div.style.display = "block";
  div.innerHTML = `<div class="codigo-final">${codigoAtual}</div>
    <button class="btn" onclick="mostrarQR('${codigoAtual}')">Entrar no WhatsApp e ver QR Code</button>
    <div id="qrcodeBox" style="display:none; text-align:center; margin:25px 0;">
      <img src="krcode.png" style="width:200px; border:3px solid #002776; border-radius:12px; margin-bottom:15px;">
    </div>`;
}

window.mostrarQR = function(codigo) {
  document.getElementById("qrcodeBox").style.display = "block";
  enviarWhats(codigo);
}

window.enviarWhats = function(codigo){
  const msg = `Bolão Copa 2026\nMeu código: ${codigo}\nNome: ${nomeAtual}\nTelefone: ${telefoneAtual}`;
  window.open(`https://api.whatsapp.com/send?phone=559181761730&text=${encodeURIComponent(msg)}`,"_blank");
}
</script>
</body>
</html>
