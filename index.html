<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolão Copa 2026</title>
<style>
:root {--verde:#009c3b; --amarelo:#ffdf00; --azul:#002776;}
body {margin:0; font-family:Segoe UI; background:linear-gradient(135deg,var(--verde) 0%,var(--amarelo) 50%,var(--azul) 100%); min-height:100vh; padding:20px;}
.container {max-width:700px; margin:0 auto; background:white; border-radius:25px; padding:35px; box-shadow:0 20px 60px rgba(0,0,0,0.4);}
h1 {text-align:center; color:var(--azul); margin:0 0 10px;}
input#nome {width:100%; padding:14px; border:2px solid #ddd; border-radius:12px; font-size:16px; margin-bottom:25px;}
.jogo {background:#f8f9fa; border:2px solid #e0e0e0; border-radius:12px; padding:15px; margin-bottom:15px; display:flex; align-items:center; justify-content:space-between;}
.jogo span {font-weight:bold; color:var(--azul);}
.jogo input {width:50px; padding:8px; text-align:center; font-size:18px; border:2px solid #ddd; border-radius:8px;}
.btn {width:100%; padding:18px; background:linear-gradient(135deg,var(--azul),var(--verde)); color:white; border:none; border-radius:12px; font-size:18px; font-weight:bold; cursor:pointer; margin-top:20px;}
.modal {display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:100; align-items:center; justify-content:center;}
.modal-content {background:white; padding:40px; border-radius:20px; text-align:center; max-width:400px;}
.modal-content h2 {color:var(--azul); margin-top:0;}
.codigo {font-size:36px; font-weight:bold; color:#e65100; letter-spacing:4px; margin:20px 0; padding:20px; background:#fff3e0; border:3px dashed #ff9800; border-radius:12px;}
.whats-btn {display:block; width:100%; padding:15px; background:#25D366; color:white; text-decoration:none; border-radius:12px; font-weight:bold; font-size:18px;}
</style>
</head>
<body>
<div class="container">
  <h1>🏆 Bolão Copa 2026</h1>
  <input type="text" id="nome" placeholder="Digite seu nome completo">
  <div id="jogos"></div>
  <button class="btn" onclick="finalizar()">Finalizar e Gerar Código</button>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h2>Pronto!</h2>
    <p>Teu código único:</p>
    <div class="codigo" id="codigoBox"></div>
    <a class="whats-btn" id="whatsLink" target="_blank">Enviar no WhatsApp</a>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAAM7MPAOuz4Fmp2rNq64BLlEcuoXo5nyM",
  authDomain: "bolao-copa.firebaseapp.com",
  projectId: "bolao-copa",
  storageBucket: "bolao-copa.firebasestorage.app",
  messagingSenderId: "857500902607",
  appId: "1:857500902607:web:3120a10c658f0b4cde6a75"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
let jogos = [];

async function carregarJogos() {
  const snap = await getDocs(collection(db, "jogos"));
  const div = document.getElementById("jogos");
  jogos = [];
  snap.forEach(doc => {
    const d = doc.data();
    jogos.push({id: doc.id, timeA: d.timeA, timeB: d.timeB});
    div.innerHTML += `
      <div class="jogo">
        <span>${d.timeA}</span>
        <input type="number" min="0" id="placarA_${doc.id}" placeholder="0">
        <span>X</span>
        <input type="number" min="0" id="placarB_${doc.id}" placeholder="0">
        <span>${d.timeB}</span>
      </div>`;
  });
}
carregarJogos();

window.finalizar = async function() {
  const nome = document.getElementById("nome").value.trim();
  if (!nome) return alert("Digite teu nome!");
  
  const palpites = [];
  for (let j of jogos) {
    const a = document.getElementById(`placarA_${j.id}`).value;
    const b = document.getElementById(`placarB_${j.id}`).value;
    if (a === "" || b === "") return alert("Preencha todos os placares!");
    palpites.push({jogoId: j.id, timeA: j.timeA, timeB: j.timeB, placarA: a, placarB: b});
  }
  
  const codigo = Math.random().toString(36).substring(2, 8).toUpperCase();
  
  await addDoc(collection(db, "palpites"), {
    nome, codigo, palpites, data: serverTimestamp()
  });
  
  document.getElementById("codigoBox").innerText = codigo;
  document.getElementById("modal").style.display = "flex";
  
  const msg = encodeURIComponent(`Meu código do Bolão Copa 2026: ${codigo}\nNome: ${nome}`);
  document.getElementById("whatsLink").href = `https://wa.me/559181761730?text=${msg}`;
}
</script>
</body>
</html>
