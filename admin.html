<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Bolão da Copa do Mundo 2026 - ADM</title>
<style>
:root {--verde:#009c3b; --amarelo:#ffdf00; --azul:#002776;}
body {margin:0; font-family:'Segoe UI',sans-serif; background:linear-gradient(135deg,#e8f5e9 0%,#fffde7 100%); padding:20px;}
#loginBox {max-width:420px; margin:120px auto; background:white; padding:45px; border-radius:20px; box-shadow:0 8px 30px rgba(0,39,118,0.2); text-align:center; border-top:8px solid var(--amarelo);}
#loginBox h2 {color:var(--azul); font-size:28px; margin-bottom:10px;}
#loginBox input {width:100%; padding:16px; border:3px solid #ddd; border-radius:10px; font-size:16px; margin:25px 0; box-sizing:border-box;}
#loginBox button {width:100%; padding:16px; background:var(--verde); color:white; border:none; border-radius:10px; font-size:18px; font-weight:bold; cursor:pointer;}
#conteudo {display:none;}
.container {max-width:1100px; margin:0 auto; background:white; border-radius:20px; padding:40px; box-shadow:0 5px 25px rgba(0,0,0,0.1); border-top:10px solid var(--amarelo);}
h1 {color:var(--azul); text-align:center; font-size:36px; margin-bottom:5px;}
.subtitle {text-align:center; color:#666; font-size:16px; margin-bottom:40px;}
section {margin-bottom:45px; padding-bottom:35px; border-bottom:3px solid #f0f0f0;}
section h2 {color:var(--azul); font-size:24px;}
input {width:100%; padding:14px; border:3px solid #ddd; border-radius:10px; margin-bottom:12px; box-sizing:border-box; font-size:15px;}
.btn {padding:14px 30px; background:var(--verde); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold; font-size:16px;}
.btn-danger {background:#d32f2f;}
.codigo {font-weight:bold; color:#e65100; font-size:16px;}
table {width:100%; border-collapse:collapse; margin-top:20px;}
th {background:var(--azul); color:white; padding:15px; text-align:left;}
td {padding:14px; border-bottom:1px solid #eee;}
.comprovante {border:4px solid var(--azul); border-radius:20px; padding:35px; margin-top:25px; background:linear-gradient(135deg,#fff 0%,#fffde7 100%);}
.comprovante h2 {text-align:center; color:var(--azul); margin-top:0; font-size:28px;}
.comprovante.codigo-big {font-size:38px; font-weight:bold; color:#e65100; background:var(--amarelo); padding:18px; border-radius:12px; text-align:center; margin:25px 0; border:3px solid var(--azul);}
.jogo-linha {display:flex; justify-content:space-between; padding:15px; background:#f8f9fa; margin-bottom:10px; border-radius:10px; font-weight:600; border-left:5px solid var(--verde);}
</style>
</head>
<body>
<div id="loginBox">
  <h2>🏆 Bolão Copa 2026</h2>
  <p style="color:#666;">Acesso exclusivo do Administrador</p>
  <input type="password" id="senha" placeholder="Digite a senha">
  <button onclick="entrar()">Entrar no Painel</button>
</div>
<div id="conteudo">
  <div class="container">
    <h1>🇧🇷 BOLÃO DA COPA DO MUNDO 2026 🇧🇷</h1>
    <p class="subtitle">Painel de Administração</p>
    <section>
      <h2>⚽ Enviar Jogo para os Jogadores</h2>
      <input type="text" id="timeA" placeholder="Time A - Ex: Brasil">
      <input type="text" id="timeB" placeholder="Time B - Ex: Argentina">
      <button class="btn" onclick="addJogo()">Enviar Jogo</button>
      <div id="jogosList" style="margin-top:25px;"></div>
    </section>
    <section>
      <h2>🎫 Gerar Comprovante do Jogador</h2>
      <input type="text" id="codigoBusca" placeholder="Cole aqui o código do jogador - Ex: X7K9P2">
      <button class="btn" onclick="gerarComprovante()">Gerar Comprovante</button>
      <div id="comprovanteBox"></div>
    </section>
    <section>
      <h2>📋 Palpites Recebidos</h2>
      <button class="btn" onclick="carregarPalpites()">Atualizar Lista</button>
      <table id="tabelaPalpites">
        <thead><tr><th>Nome do Jogador</th><th>Código</th><th>Data/Hora</th></tr></thead>
        <tbody></tbody>
      </table>
    </section>
  </div>
</div>
<script type="module">
const SENHA_CORRETA = "bolao2026";
window.entrar = function() {
  if(document.getElementById("senha").value === SENHA_CORRETA) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("conteudo").style.display = "block";
    carregarJogos(); carregarPalpites();
  } else alert("Senha incorreta!");
}
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, orderBy, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
const app = initializeApp({
  apiKey: "AIzaSyAAM7MPAOuz4Fmp2rNq64BLlEcuoXo5nyM",
  authDomain: "bolao-copa.firebaseapp.com",
  projectId: "bolao-copa",
  storageBucket: "bolao-copa.firebasestorage.app",
  messagingSenderId: "857500902607",
  appId: "1:857500902607:web:3120a10c658f0b4cde6a75"
});
const db = getFirestore(app);
window.addJogo = async function() {
  const timeA = document.getElementById("timeA").value.trim();
  const timeB = document.getElementById("timeB").value.trim();
  if(!timeA ||!timeB) return alert("Preencha os dois times!");
  await addDoc(collection(db, "jogos"), {timeA, timeB, data:serverTimestamp()});
  alert("Jogo enviado! Já apareceu na tela do jogador.");
  document.getElementById("timeA").value = ""; document.getElementById("timeB").value = "";
  carregarJogos();
}
async function carregarJogos() {
  const snap = await getDocs(collection(db, "jogos"));
  const div = document.getElementById("jogosList");
  if(snap.empty) {div.innerHTML="<p style='color:#999;'>Nenhum jogo enviado ainda.</p>"; return;}
  div.innerHTML = "<h3 style='color:#002776'>Jogos Ativos:</h3>";
  snap.forEach(d => {
    const data = d.data();
    div.innerHTML += `<p style="padding:12px; background:#f8f9fa; border-radius:8px; margin-bottom:8px;"><strong>${data.timeA}</strong> vs <strong>${data.timeB}</strong> <button class="btn btn-danger" style="float:right; padding:6px 15px;" onclick="deletarJogo('${d.id}')">Remover</button></p>`;
  });
}
window.deletarJogo = async function(id) {
  if(confirm("Remover este jogo?")) {await deleteDoc(doc(db, "jogos", id)); carregarJogos();}
}
window.gerarComprovante = async function() {
  const codigo = document.getElementById("codigoBusca").value.trim().toUpperCase();
  if(!codigo) return alert("Digite um código!");
  const q = query(collection(db, "palpites"), where("codigo", "==", codigo));
  const snap = await getDocs(q);
  if(snap.empty) return alert("Código não encontrado!");
  const data = snap.docs[0].data();
  const dataFormatada = data.data?.toDate? new Date(data.data.toDate()).toLocaleString("pt-BR") : "-";
  let html = `<div class="comprovante"><h2>🏆 COMPROVANTE OFICIAL - BOLÃO COPA 2026</h2>
    <div class="codigo-big">${data.codigo}</div>
    <div style="font-size:18px; margin-bottom:10px;"><strong>Jogador:</strong> ${data.nome}</div>
    <div style="font-size:16px; margin-bottom:25px;"><strong>Data do Palpite:</strong> ${dataFormatada}</div>
    <h3 style="color:#002776; border-bottom:3px solid #ffdf00; padding-bottom:10px;">Seus Palpites:</h3>`;
  data.palpites.forEach(p => {
    html += `<div class="jogo-linha"><span>${p.timeA} vs ${p.timeB}</span><span style="font-size:20px;">${p.placarA} X ${p.placarB}</span></div>`;
  });
  html += `</div><button class="btn" style="margin-top:20px; width:100%;" onclick="window.print()">🖨️ Imprimir ou Salvar PDF</button>`;
  document.getElementById("comprovanteBox").innerHTML = html;
}
window.carregarPalpites = async function() {
  const q = query(collection(db, "palpites"), orderBy("data", "desc"));
  const snap = await getDocs(q);
  const tbody = document.querySelector("#tabelaPalpites tbody");
  if(snap.empty) {tbody.innerHTML="<tr><td colspan='3' style='text-align:center; color:#999;'>Nenhum palpite recebido ainda</td></tr>"; return;}
  tbody.innerHTML = "";
  snap.forEach(d => {
    const data = d.data();
    const dataFormatada = data.data?.toDate? new Date(data.data.toDate()).toLocaleString("pt-BR") : "-";
    tbody.innerHTML += `<tr><td>${data.nome}</td><td class="codigo">${data.codigo}</td><td>${dataFormatada}</td></tr>`;
  });
}
</script>
</body>
</html>
